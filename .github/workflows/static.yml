
name: Deploy static content to Pages

on:
  # 仅在推送到默认分支时运行
  push:
    branches: ['main']
  # 允许手动从 Actions 标签页触发工作流
  workflow_dispatch:

# 设置 GITHUB_TOKEN 的权限，以允许部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 允许一个并发的部署
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  # 单次部署的工作描述
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm' # 如果使用 yarn 或 pnpm，请相应更改
      
      - name: Install dependencies
        run: pnpm ci # 或者 pnpm install
      
      - name: Build
        run: pnpm run build # 确保你的 package.json 中有此脚本，且输出到 dist 目录
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 上传整个 dist 目录，请根据你的构建输出目录修改此处
          path: './dist'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
